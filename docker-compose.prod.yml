# Production pilot overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    ports: []  # API reachable only via nginx on the internal network
    environment:
      ENVIRONMENT: production
      ALLOW_INLINE_PATIENT: "0"
      REQUIRE_API_KEY: "1"
      API_KEYS: ${API_KEYS:-pilot-dev-key-change-me}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-1}
      PERSONALIZATION_ENABLED: ${PERSONALIZATION_ENABLED:-0}

  frontend:
    environment:
      ENGINE_API_KEY: ${API_KEYS:-pilot-dev-key-change-me}
      CONSOLE_AUTH_USER: ${CONSOLE_AUTH_USER:-}
      CONSOLE_AUTH_PASSWORD: ${CONSOLE_AUTH_PASSWORD:-}
