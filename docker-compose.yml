services:

  # ── API Service ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: supplement_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-supplement_engine_dev}
      POSTGRES_DSN: postgresql+asyncpg://supplement:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/supplement_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_ENABLED: ${KAFKA_ENABLED:-0}
      PERSONALIZATION_ENABLED: ${PERSONALIZATION_ENABLED:-0}
      MAX_RECOMMENDATIONS: "8"
      DRS_THRESHOLD: "0.35"
      MIN_CONFIDENCE: "0.40"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ALLOW_INLINE_PATIENT: ${ALLOW_INLINE_PATIENT:-1}
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro   # hot-reload in dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - supplement_net

  # ── Frontend — Next.js clinician console ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supplement_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Server-side proxy target — internal api service on the shared network.
      ENGINE_API_URL: http://api:8000
      ENGINE_API_KEY: ${ENGINE_API_KEY:-dev-key}
      CONSOLE_AUTH_USER: ${CONSOLE_AUTH_USER:-}
      CONSOLE_AUTH_PASSWORD: ${CONSOLE_AUTH_PASSWORD:-}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - supplement_net

  # ── Neo4j Knowledge Graph ─────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: supplement_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-supplement_engine_dev}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./scripts/neo4j_seed.cypher:/var/lib/neo4j/import/seed.cypher
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - supplement_net

  # ── PostgreSQL — Patient store + Audit log ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: supplement_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: supplement_db
      POSTGRES_USER: supplement
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplement -d supplement_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supplement_net

  # ── Redis — caching layer for KG queries ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: supplement_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supplement_net

  # ── Kafka — event streaming (optional; enable with profile `ingestion`) ───
  zookeeper:
    profiles: [ingestion]
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: supplement_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - supplement_net

  kafka:
    profiles: [ingestion]
    image: confluentinc/cp-kafka:7.6.0
    container_name: supplement_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - supplement_net

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: supplement_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - supplement_net

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:

networks:
  supplement_net:
    driver: bridge
